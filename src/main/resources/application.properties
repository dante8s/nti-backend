# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:nti_db}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
server.port=8080

# JPA / Flyway
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#  Email (override via env or application-local.properties)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# reCAPTCHA
recaptcha.secret=${RECAPTCHA_SECRET:}
recaptcha.url=https://www.google.com/recaptcha/api/siteverify

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# App URLs
app.backend-url=${APP_BACKEND_URL:http://localhost:${server.port}}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Email sender
app.mail.from=${MAIL_FROM:noreply@nti.sk}
app.mail.admin=${MAIL_ADMIN:admin@nti.sk}

# File upload
app.upload-dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
